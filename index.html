<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Interferência de Ondas</title>
  <style>
    body {
      margin: 0;
      background: #0d1117;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    canvas {
      border: 2px solid white;
      margin-top: 10px;
      background: #111;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 10px;
      gap: 20px;
    }
    .wave-control {
      background: #1e2229;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 0 8px rgba(255,255,255,0.2);
    }
    label {
      display: block;
      font-size: 14px;
      margin: 5px 0;
    }
    .buttons {
      margin-top: 15px;
      display: flex;
      gap: 15px;
    }
    button {
      padding: 8px 16px;
      font-size: 14px;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #238636;
      color: white;
    }
    button.destructive {
      background: #da3633;
    }
  </style>
</head>
<body>
  <h2>Interferência de Ondas Senoidais</h2>
  <canvas id="canvas" width="1000" height="400"></canvas>

  <div class="controls">
    <div class="wave-control">
      <h3>Onda 1 (Ciano)</h3>
      <label>Amplitude: <input id="amp1" type="range" min="0" max="100" value="50"></label>
      <label>Frequência: <input id="freq1" type="range" min="1" max="5" value="2"></label>
      <label>Fase: <input id="phase1" type="range" min="0" max="628" value="0"></label>
    </div>
    <div class="wave-control">
      <h3>Onda 2 (Magenta)</h3>
      <label>Amplitude: <input id="amp2" type="range" min="0" max="100" value="50"></label>
      <label>Frequência: <input id="freq2" type="range" min="1" max="5" value="2"></label>
      <label>Fase: <input id="phase2" type="range" min="0" max="628" value="314"></label>
    </div>
  </div>

  <div class="buttons">
    <button id="constructive">Interferência Construtiva</button>
    <button class="destructive" id="destructive">Interferência Destrutiva</button>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const width = canvas.width;
    const height = canvas.height;
    const centerY = height / 2;

    // sliders
    const amp1 = document.getElementById("amp1");
    const freq1 = document.getElementById("freq1");
    const phase1 = document.getElementById("phase1");
    const amp2 = document.getElementById("amp2");
    const freq2 = document.getElementById("freq2");
    const phase2 = document.getElementById("phase2");

    // botões
    const btnConstructive = document.getElementById("constructive");
    const btnDestructive = document.getElementById("destructive");

    // função de onda
    function onda(A, f, phi, x, t) {
      return A * Math.sin(2 * Math.PI * f * (x / 200 - 0.01 * t) + phi);
    }

    function draw(t) {
      ctx.clearRect(0, 0, width, height);

      // parâmetros atuais
      let A1 = parseFloat(amp1.value);
      let f1 = parseFloat(freq1.value);
      let phi1 = parseFloat(phase1.value) / 100;
      let A2 = parseFloat(amp2.value);
      let f2 = parseFloat(freq2.value);
      let phi2 = parseFloat(phase2.value) / 100;

      // Onda 1
      ctx.beginPath();
      ctx.strokeStyle = "cyan";
      for (let x = 0; x < width; x++) {
        const y = centerY + onda(A1, f1, phi1, x, t);
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // Onda 2
      ctx.beginPath();
      ctx.strokeStyle = "magenta";
      for (let x = 0; x < width; x++) {
        const y = centerY + onda(A2, f2, phi2, x, t);
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // Superposição
      ctx.beginPath();
      ctx.strokeStyle = "white";
      ctx.lineWidth = 2;
      for (let x = 0; x < width; x++) {
        const y = centerY + onda(A1, f1, phi1, x, t) + onda(A2, f2, phi2, x, t);
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.lineWidth = 1;

      requestAnimationFrame(() => draw(t + 1));
    }

    // Botões: setam os valores direto nos sliders
    btnConstructive.addEventListener("click", () => {
      amp1.value = 50; amp2.value = 50;
      freq1.value = 2; freq2.value = 2;
      phase1.value = 0; phase2.value = 0;
    });

    btnDestructive.addEventListener("click", () => {
      amp1.value = 50; amp2.value = 50;
      freq1.value = 2; freq2.value = 2;
      phase1.value = 0; phase2.value = 314; // ~π de diferença
    });

    draw(0);
  </script>
</body>
</html>
